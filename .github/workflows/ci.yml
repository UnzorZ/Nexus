name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel in-flight runs for the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: Backend (gradle test)
    runs-on: ubuntu-latest
    # Backend tests use Testcontainers, which needs the Docker daemon present on the
    # runner (available by default on ubuntu-latest).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Compile + run tests (includes Spring Modulith canary)
        run: ./gradlew :apps:nexus-api:test --no-daemon --console=plain
      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: apps/api/build/reports/tests/
          if-no-files-found: ignore

  sdk:
    name: SDK (starter + example tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Starter + example compile + tests
        run: ./gradlew :packages:nexus-spring-boot-starter:test :examples:nexus-spring-client-app:test --no-daemon --console=plain

  web:
    name: Dashboard (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      # Advisory for now: there is pre-existing react-hooks/refs debt in the
      # dashboard prototype. Make it blocking once those are resolved.
      - name: Lint (advisory)
        run: npm run lint
        continue-on-error: true
      - run: npm run build
