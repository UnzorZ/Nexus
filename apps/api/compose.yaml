name: nexus

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
    ports:
      - "5432:5432"
    volumes:
      - nexus-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "node -e \"require('next/package.json'); require('lightningcss')\" >/dev/null 2>&1 || npm install --include=optional; npm run dev -- --hostname 0.0.0.0"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXUS_AUTH_BASE_URL: "http://localhost:8080"
      NEXUS_AUTH_INTERNAL_BASE_URL: "http://host.docker.internal:8080"
      NEXUS_FRONTEND_BASE_URL: "http://localhost:3000"
    ports:
      - "3000:3000"
    volumes:
      - ../web:/app
      - nexus-web-node-modules:/app/node_modules
      - nexus-web-npm-cache:/root/.npm

volumes:
  nexus-postgres-data:
  nexus-web-node-modules:
  nexus-web-npm-cache:
