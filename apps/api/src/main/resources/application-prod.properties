# Production profile hardening. Activate with SPRING_PROFILES_ACTIVE=prod.
#
# IdentityStartupGuard (identity) and VaultCrypto (shared) abort startup when the dev
# JWK keystore or the dev vault master key are still in use under a non-dev profile, so
# production cannot boot misconfigured. This file only adds prod-specific defaults;
# secrets come from environment variables (see .env.example / compose.prod.yaml).

# Do NOT let Spring Boot manage the dev compose stack in production.
spring.docker.compose.enabled=false

# Honor X-Forwarded-{Proto,Host,Port} so Nexus advertises the public scheme/host
# when fronted by a TLS-terminating reverse proxy. The OIDC issuer and the
# end-user login/consent URLs are built from request.getScheme()/getServerName()
# (ProjectEndUserAuthController#realmIssuer, ConsentController,
# DeviceVerificationController, ProjectOauthAuthenticationEntryPoint); without
# this, behind an HTTPS proxy Nexus would emit an `http://...:8080` issuer and
# break OIDC iss matching. NATIVE only rewrites when the headers are present, so
# direct (no-proxy) deployments are unaffected.
#
# TRUST: ForwardedHeaderFilter trusts whatever headers reach the app, so the edge
# proxy MUST strip/overwrite X-Forwarded-* from untrusted clients. Only expose
# Nexus (8080) to your reverse proxy, never directly to the public internet.
server.forward-headers-strategy=native

# Hide actuator component details in production (readiness still reports UP/DOWN).
management.endpoint.health.show-details=never

# Secure session cookies by default. Requires TLS to terminate at the edge or on the
# API origin; override via env if your topology differs.
nexus.session.cookie.same-site=${NEXUS_SESSION_COOKIE_SAME_SITE:Lax}
nexus.session.cookie.secure=${NEXUS_SESSION_COOKIE_SECURE:true}

# Quieter security logging in production.
logging.level.org.springframework.security=WARN
