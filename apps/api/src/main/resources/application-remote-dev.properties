# Remote development through HTTPS tunnels such as ngrok.
#
# Browser fetches from the public frontend tunnel to the public API tunnel are
# cross-site, so the panel session cookie must be sent as SameSite=None and
# Secure. Keep this profile off for plain localhost HTTP development.
nexus.session.cookie.same-site=${NEXUS_SESSION_COOKIE_SAME_SITE:None}
nexus.session.cookie.secure=${NEXUS_SESSION_COOKIE_SECURE:true}
