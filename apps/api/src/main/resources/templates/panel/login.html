<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nexus Panel Sign In</title>
    <link rel="stylesheet" th:href="@{/identity/login.css}">
</head>
<body>
<main class="nexus-login-container">
    <section class="login-panel">
        <div class="login-card">
            <div class="logo-container">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="4 5 12 11 20 5"></polyline>
                    <polyline points="4 11 12 17 20 11"></polyline>
                    <polyline points="4 17 12 23 20 17"></polyline>
                </svg>
                <div class="logo-text">
                    <h1>NEXUS</h1>
                    <span class="subtitle">CONTROL PLANE</span>
                </div>
            </div>

            <div class="header-text">
                <h2>Panel de control</h2>
                <p>Inicia sesión con tu cuenta Nexus</p>
            </div>

            <div class="alert alert-error" th:if="${param.error}">
                Email o contraseña incorrectos.
            </div>
            <div class="alert alert-success" th:if="${param.logout}">
                Sesión cerrada correctamente.
            </div>

            <form class="login-form" method="post" th:action="@{/panel/login}">
                <input type="hidden" th:if="${param.continue}" name="continue" th:value="${param.continue}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="input-group">
                    <label for="username">Email</label>
                    <div class="input-wrapper">
                        <input id="username" name="username" type="email" placeholder="you@example.com"
                               autocomplete="username" required autofocus>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <div class="input-wrapper">
                        <input id="password" name="password" type="password" placeholder="password"
                               autocomplete="current-password" required>
                    </div>
                </div>

                <button type="submit" class="sign-in-btn">Iniciar sesión</button>
            </form>

            <div class="admin-notice">
                <div class="notice-text">
                    <strong>Solo cuentas Nexus</strong>
                    <p>Este login es exclusivo del panel. Los usuarios OAuth de proyectos no pueden acceder aquí.</p>
                </div>
            </div>

            <div class="footer">Nexus Control Plane</div>
        </div>
    </section>
</main>
</body>
</html>
