<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Set new password — Nexus</title>
    <link rel="stylesheet" th:href="@{/identity/login.css}">
</head>
<body>
<main class="authentication-panel">
    <div class="authentication-panel__inner">
        <header class="login-header">
            <h2>Set new password</h2>
            <p>Project realm <code th:text="${projectSlug}">slug</code></p>
        </header>

        <div class="alert alert--info" th:if="${done == true}" role="status">
            <span>Password updated — you can now sign in.</span>
        </div>
        <div class="alert alert--error" th:if="${invalid == true}" role="alert">
            <span>This reset link is invalid or has expired. Request a new one.</span>
        </div>
        <div class="alert alert--error" th:if="${weak == true}" role="alert">
            <span>Password must be at least 8 characters.</span>
        </div>

        <form th:unless="${done == true or invalid == true}" class="login-form"
              th:action="@{/p/{slug}/password-reset/confirm(slug=${projectSlug})}" th:method="post">
            <input type="hidden" th:name="${csrf.parameterName}" th:value="${csrf.token}"/>
            <input type="hidden" name="token" th:value="${token}"/>
            <div class="form-field password-field">
                <label for="newPassword">New password</label>
                <input id="newPassword" name="newPassword" type="password" autocomplete="new-password" required minlength="8"/>
            </div>
            <button type="submit" class="sign-in-button">Set new password</button>
        </form>

        <p th:if="${done == true or invalid == true}"><a th:href="@{/p/{slug}/login(slug=${projectSlug})}">Go to sign in</a></p>
    </div>
</main>
</body>
</html>
