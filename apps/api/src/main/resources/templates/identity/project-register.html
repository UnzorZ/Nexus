<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create account — Nexus</title>
    <link rel="stylesheet" th:href="@{/identity/login.css}">
</head>
<body>
<main class="authentication-panel">
    <div class="authentication-panel__inner">
        <header class="login-header">
            <h2>Create account</h2>
            <p>Project realm <code th:text="${projectSlug}">slug</code></p>
        </header>

        <div class="alert alert--info" th:if="${done == true or resent == true}" role="status">
            <span th:if="${done == true}">Check your email — we sent a verification link to <strong th:text="${email}">email</strong>.</span>
            <span th:if="${resent == true}">If an account exists for that email, we sent a new verification link.</span>
        </div>

        <div class="alert alert--error" th:if="${error}" role="alert">
            <span th:text="${error}">Error.</span>
        </div>

        <form th:unless="${done == true or resent == true}" class="login-form"
              th:action="@{/p/{slug}/register(slug=${projectSlug})}" th:method="post" autocomplete="on">
            <input type="hidden" th:name="${csrf.parameterName}" th:value="${csrf.token}"/>

            <div class="form-field">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" autocomplete="username" required th:value="${email}"/>
            </div>

            <div class="form-field">
                <label for="displayName">Display name (optional)</label>
                <input id="displayName" name="displayName" type="text" autocomplete="name"/>
            </div>

            <div class="form-field">
                <label for="username">Username (optional)</label>
                <input id="username" name="username" type="text" autocomplete="username"/>
            </div>

            <div class="form-field password-field">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" autocomplete="new-password" required minlength="8"/>
            </div>

            <button type="submit" class="sign-in-button">Create account</button>
            <p><a th:href="@{/p/{slug}/login(slug=${projectSlug})}">Already have an account? Sign in</a></p>
        </form>

        <form th:if="${done == true or resent == true}" class="login-form"
              th:action="@{/p/{slug}/verify-email/resend(slug=${projectSlug})}" th:method="post">
            <input type="hidden" th:name="${csrf.parameterName}" th:value="${csrf.token}"/>
            <div class="form-field">
                <label for="resendEmail">Didn't get it? Resend verification to</label>
                <input id="resendEmail" name="email" type="email" required th:value="${email}"/>
            </div>
            <button type="submit" class="sign-in-button">Resend verification</button>
            <p><a th:href="@{/p/{slug}/login(slug=${projectSlug})}">Back to sign in</a></p>
        </form>
    </div>
</main>
</body>
</html>
