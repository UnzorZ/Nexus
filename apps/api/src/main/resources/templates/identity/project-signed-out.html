<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Signed out — Nexus</title>
    <link rel="stylesheet" th:href="@{/identity/login.css}">
    <style>
        .signed-out-actions { display: flex; flex-direction: column; gap: .6rem; margin-top: .5rem; }
        .link-button {
            display: block; text-align: center; text-decoration: none;
            padding: .7rem 1rem; border-radius: 8px; font-weight: 600;
            background: var(--accent); color: #fff;
        }
        .link-button:hover { background: var(--accent-hover); }
    </style>
</head>
<body>
<main class="authentication-panel">
    <div class="authentication-panel__inner">
        <header class="login-header">
            <h2 th:text="${done} ? 'Signed out' : 'Sign out?'">Sign out?</h2>
            <p>Project realm <code th:text="${projectSlug}">slug</code></p>
        </header>

        <div th:if="${done}" class="alert alert--success" role="status">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="9"></circle>
                <path d="M8 12l3 3 5-6"></path>
            </svg>
            <span>You've been signed out of this project realm.</span>
        </div>

        <form class="login-form" th:unless="${done}" th:action="@{/p/{slug}/logout(slug=${projectSlug})}" th:method="post">
            <input type="hidden" th:name="${csrf.parameterName}" th:value="${csrf.token}"/>
            <p class="consent-hint" style="color:var(--muted);font-size:.9rem;">You'll need to sign in again to continue.</p>
            <button type="submit" class="sign-in-button">Sign out</button>
        </form>

        <div th:if="${done}" class="signed-out-actions">
            <a class="link-button" th:href="@{/p/{slug}/login(slug=${projectSlug})}">Sign in again</a>
        </div>
    </div>
</main>
</body>
</html>
