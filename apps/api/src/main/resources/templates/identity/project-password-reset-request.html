<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset password — Nexus</title>
    <link rel="stylesheet" th:href="@{/identity/login.css}">
</head>
<body>
<main class="authentication-panel">
    <div class="authentication-panel__inner">
        <header class="login-header">
            <h2>Reset password</h2>
            <p>Project realm <code th:text="${projectSlug}">slug</code></p>
        </header>

        <div class="alert alert--info" th:if="${sent == true}" role="status">
            <span>If an account exists for that email, we sent a reset link.</span>
        </div>

        <form th:unless="${sent == true}" class="login-form"
              th:action="@{/p/{slug}/password-reset(slug=${projectSlug})}" th:method="post">
            <input type="hidden" th:name="${csrf.parameterName}" th:value="${csrf.token}"/>
            <div class="form-field">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" autocomplete="username" required/>
            </div>
            <button type="submit" class="sign-in-button">Send reset link</button>
            <p><a th:href="@{/p/{slug}/login(slug=${projectSlug})}">Back to sign in</a></p>
        </form>
    </div>
</main>
</body>
</html>
