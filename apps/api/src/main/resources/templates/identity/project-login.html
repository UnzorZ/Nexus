<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in — Nexus</title>
    <link rel="stylesheet" th:href="@{/identity/login.css}">
</head>
<body>
<main class="authentication-panel">
    <div class="authentication-panel__inner">
        <header class="login-header">
            <h2>Sign in</h2>
            <p>Project realm <code th:text="${projectSlug}">slug</code></p>
        </header>

        <div class="alert alert--error" th:if="${error}" role="alert">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="9"></circle>
                <path d="M12 8v5"></path>
                <path d="M12 16h.01"></path>
            </svg>
            <span th:text="${error}">Invalid email or password.</span>
        </div>

        <form class="login-form" th:action="@{/p/{slug}/login(slug=${projectSlug})}" th:method="post" autocomplete="on">
            <input type="hidden" th:name="${csrf.parameterName}" th:value="${csrf.token}"/>

            <div class="form-field">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" autocomplete="username" required
                       th:value="${email}"/>
            </div>

            <div class="form-field password-field">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required/>
                <button type="button" class="password-toggle" aria-pressed="false" aria-label="Show password">
                    <svg class="eye-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                    <svg class="eye-off-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M3 3l18 18"></path>
                        <path d="M10.6 5.1A10.9 10.9 0 0 1 12 5c6.5 0 10 7 10 7a17.8 17.8 0 0 1-3.2 4.1"></path>
                        <path d="M6.6 6.6A17.8 17.8 0 0 0 2 12s3.5 7 10 7a10.9 10.9 0 0 0 4.2-.8"></path>
                        <path d="M9.9 9.9a3 3 0 0 0 4.2 4.2"></path>
                    </svg>
                </button>
            </div>

            <button type="submit" class="sign-in-button">Sign in</button>
        </form>
    </div>
</main>
<script th:src="@{/identity/login.js}"></script>
</body>
</html>
