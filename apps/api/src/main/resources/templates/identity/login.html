<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nexus Sign In</title>
    <link rel="stylesheet" th:href="@{/identity/login.css}">
</head>
<body>
<main class="nexus-login-container">
    <section class="login-panel">
        <div class="login-card">
            <div class="logo-container">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="4 5 12 11 20 5"></polyline>
                    <polyline points="4 11 12 17 20 11"></polyline>
                    <polyline points="4 17 12 23 20 17"></polyline>
                </svg>
                <div class="logo-text">
                    <h1>NEXUS</h1>
                    <span class="subtitle">CONTROL PLANE</span>
                </div>
            </div>

            <div class="header-text">
                <h2>Welcome back</h2>
                <p>Sign in to continue through Nexus Identity</p>
            </div>

            <div class="alert alert-error" th:if="${param.error}">
                Invalid username or password.
            </div>
            <div class="alert alert-success" th:if="${param.logout}">
                You have been signed out.
            </div>

            <form class="login-form" method="post" th:action="@{/login}">
                <div class="input-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                        </svg>
                        <input id="username" name="username" type="text" placeholder="user" autocomplete="username" required autofocus>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input id="password" name="password" type="password" placeholder="password" autocomplete="current-password" required>
                    </div>
                </div>

                <div class="form-actions">
                    <label class="remember-me">
                        <input type="checkbox" name="remember-me">
                        <span>Remember me</span>
                    </label>
                    <span class="forgot-password">Recovery soon</span>
                </div>

                <button type="submit" class="sign-in-btn">Sign in</button>
            </form>

            <div class="admin-notice">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    <path d="m9 12 2 2 4-4"></path>
                </svg>
                <div class="notice-text">
                    <strong>Admin access only</strong>
                    <p>This area is restricted to Nexus administrators.</p>
                </div>
            </div>

            <div class="footer">Nexus Control Plane v0.1</div>
        </div>
    </section>

    <section class="illustration-panel" aria-hidden="true">
        <div class="bg-circles"></div>
        <div class="nodes-container">
            <svg class="connecting-lines">
                <line x1="300" y1="300" x2="300" y2="100"></line>
                <circle cx="300" cy="180" r="4" fill="#4f46e5"></circle>
                <line x1="300" y1="300" x2="500" y2="250"></line>
                <circle cx="420" cy="270" r="4" fill="#4f46e5"></circle>
                <line x1="300" y1="300" x2="450" y2="450"></line>
                <circle cx="390" cy="390" r="4" fill="#10b981"></circle>
                <line x1="300" y1="300" x2="150" y2="450"></line>
                <circle cx="210" cy="390" r="4" fill="#4f46e5"></circle>
                <line x1="300" y1="300" x2="100" y2="250"></line>
                <circle cx="180" cy="270" r="4" fill="#06b6d4"></circle>
            </svg>

            <div class="node projects-node">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                    <line x1="12" y1="22.08" x2="12" y2="12"></line>
                </svg>
                <span>Projects</span>
            </div>
            <div class="node identity-node">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span>Identity</span>
            </div>
            <div class="node heartbeat-node">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                </svg>
                <span>Heartbeat</span>
            </div>
            <div class="node permissions-node">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    <path d="m9 12 2 2 4-4"></path>
                </svg>
                <span>Permissions</span>
            </div>
            <div class="node apikeys-node">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"></path>
                    <path d="m21 2-9.6 9.6"></path>
                    <circle cx="7.5" cy="15.5" r="5.5"></circle>
                </svg>
                <span>API Keys</span>
            </div>
            <div class="node center-node">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="4 5 12 11 20 5"></polyline>
                    <polyline points="4 11 12 17 20 11"></polyline>
                    <polyline points="4 17 12 23 20 17"></polyline>
                </svg>
            </div>
        </div>
    </section>
</main>
</body>
</html>
