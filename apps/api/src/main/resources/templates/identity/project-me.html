<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Signed in — Nexus</title>
    <link rel="stylesheet" th:href="@{/identity/login.css}">
</head>
<body>
<main class="authentication-panel">
    <div class="authentication-panel__inner">
        <header class="login-header">
            <h2>Signed in</h2>
            <p>You are authenticated in project realm <code th:text="${projectSlug}">slug</code>.</p>
        </header>
        <div class="alert alert--success" role="status">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M20 6L9 17l-5-5"></path>
            </svg>
            <span>Session established. This is a B1 smoke page; the end-user app ships with B2 (OAuth).</span>
        </div>
    </div>
</main>
</body>
</html>
