<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Authorize — Nexus</title>
    <link rel="stylesheet" th:href="@{/identity/login.css}">
    <style>
        .consent-hint { color: var(--muted); font-size: .9rem; margin: 0 0 .5rem; }
        .consent-scope { display: flex; align-items: center; gap: .55rem; padding: .4rem 0; font-size: .92rem; }
        .consent-scope input { accent-color: var(--accent); width: 16px; height: 16px; }
        .consent-cancel { margin-top: .75rem; text-align: center; }
        .consent-cancel a { color: var(--muted); font-size: .85rem; text-decoration: none; }
        .consent-cancel a:hover { color: var(--ink); text-decoration: underline; }
    </style>
</head>
<body>
<main class="authentication-panel">
    <div class="authentication-panel__inner">
        <header class="login-header">
            <h2>Authorize <span th:text="${clientName}">app</span></h2>
            <p>Review the access this app is requesting.</p>
        </header>

        <form class="login-form" th:action="@{${authorizeAction}}" th:method="post">
            <input type="hidden" th:name="${csrf.parameterName}" th:value="${csrf.token}"/>
            <input type="hidden" name="client_id" th:value="${clientId}"/>
            <input type="hidden" name="state" th:value="${state}"/>

            <div class="form-field" th:if="${not #lists.isEmpty(scopes)}">
                <p class="consent-hint">This app will be able to:</p>
                <label class="consent-scope" th:each="scope : ${scopes}">
                    <input type="checkbox" name="scope" th:value="${scope}" checked/>
                    <span th:text="${scope}">scope</span>
                </label>
            </div>

            <button type="submit" class="sign-in-button">Authorize</button>
        </form>

        <p class="consent-cancel">
            <a th:href="${authorizeAction}">Not now</a>
        </p>
    </div>
</main>
</body>
</html>
