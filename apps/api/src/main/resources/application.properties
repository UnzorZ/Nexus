spring.application.name=Nexus

# Database
spring.datasource.url=${NEXUS_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nexus}
spring.datasource.username=${NEXUS_DATASOURCE_USERNAME:nexus}
spring.datasource.password=${NEXUS_DATASOURCE_PASSWORD:nexus}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Security logging (verbose, useful for local debugging)
logging.level.org.springframework.security=DEBUG

# Default in-memory user (demo/local)
spring.security.user.name=user
spring.security.user.password=password

# Frontend base URL used by OIDC redirect/logout URIs
nexus.frontend-base-url=${NEXUS_FRONTEND_BASE_URL:http://localhost:3000}

# OAuth2 Authorization Server - registered client: oidc-client
spring.security.oauth2.authorizationserver.client.oidc-client.registration.client-id=oidc-client
spring.security.oauth2.authorizationserver.client.oidc-client.registration.client-secret={noop}secret
spring.security.oauth2.authorizationserver.client.oidc-client.registration.client-authentication-methods[0]=client_secret_basic
spring.security.oauth2.authorizationserver.client.oidc-client.registration.authorization-grant-types[0]=authorization_code
spring.security.oauth2.authorizationserver.client.oidc-client.registration.authorization-grant-types[1]=refresh_token
spring.security.oauth2.authorizationserver.client.oidc-client.registration.redirect-uris[0]=${nexus.frontend-base-url}/login/oauth2/code/oidc-client
spring.security.oauth2.authorizationserver.client.oidc-client.registration.post-logout-redirect-uris[0]=${nexus.frontend-base-url}/
spring.security.oauth2.authorizationserver.client.oidc-client.registration.scopes[0]=openid
spring.security.oauth2.authorizationserver.client.oidc-client.registration.scopes[1]=profile

# Require consent screen during authorization
spring.security.oauth2.authorizationserver.client.oidc-client.require-authorization-consent=true
