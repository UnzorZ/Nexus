spring.application.name=Nexus

# Docker Compose
# The repository-root file is the single source of truth for local PostgreSQL,
# Redis and the Next.js frontend. The Gradle bootRun task also uses the
# repository root as its working directory.
spring.docker.compose.file=${NEXUS_COMPOSE_FILE:compose.yaml}
# Always run the idempotent `docker compose up` command. With the default
# `if-running` mode, having only PostgreSQL or Redis active prevents Spring Boot
# from starting a missing frontend container.
spring.docker.compose.start.skip=never

# Database
spring.datasource.url=${NEXUS_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nexus}
spring.datasource.username=${NEXUS_DATASOURCE_USERNAME:nexus}
spring.datasource.password=${NEXUS_DATASOURCE_PASSWORD:nexus}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Redis (shared, single instance). Used by Spring Session and future modules.
spring.data.redis.url=${NEXUS_REDIS_URL:redis://localhost:6379}
spring.data.redis.connect-timeout=2s
spring.data.redis.timeout=2s

# Security logging (verbose, useful for local debugging)
logging.level.org.springframework.security=DEBUG

# Actuator / health probes
management.endpoint.health.probes.add-additional-paths=true
management.endpoint.health.show-details=when-authorized
management.endpoints.web.exposure.include=health,prometheus
# Tag all metrics with the application name (useful in multi-tenant Prometheus scrapes).
management.metrics.tags.application=${spring.application.name}
management.endpoint.health.group.readiness.include=db,redis,jwkSigningKey

# Frontend base URL for panel redirects and OAuth bootstrap post-logout URI
nexus.frontend-base-url=${NEXUS_FRONTEND_BASE_URL:http://localhost:3000}

# Additional origins allowed for cross-origin panel API calls (comma-separated).
# Useful for dev across several tunnels/ports. Credentials are always required, so
# the wildcard "*" is never used.
nexus.allowed-dev-origins=${NEXUS_ALLOWED_DEV_ORIGINS:}

# External-facing API base URL for end-user email links (verification / password reset).
# Empty = derive from the incoming request origin (works for local + tunnel dev). Set
# explicitly when behind a reverse proxy / non-trivial topology.
nexus.api.external-base-url=${NEXUS_API_EXTERNAL_BASE_URL:}

# Panel session (Redis-backed via Spring Session). The timeout controls the real
# Redis session inactivity interval; the cookie properties are applied to Spring
# Session's CookieSerializer. See PanelSessionConfiguration.
nexus.session.timeout=${NEXUS_SESSION_TIMEOUT:7d}
nexus.session.cookie.name=${NEXUS_SESSION_COOKIE_NAME:JSESSIONID}
nexus.session.cookie.path=${NEXUS_SESSION_COOKIE_PATH:/}
nexus.session.cookie.http-only=${NEXUS_SESSION_COOKIE_HTTP_ONLY:true}
nexus.session.cookie.same-site=${NEXUS_SESSION_COOKIE_SAME_SITE:Lax}
nexus.session.cookie.secure=${NEXUS_SESSION_COOKIE_SECURE:false}
nexus.session.cookie.max-age=${NEXUS_SESSION_COOKIE_MAX_AGE:7d}

# Session revocation reliability. Spring Modulith persists event publications and
# PanelSessionRevocationRepublisher re-delivers incomplete NexusAccountSessionsRevocationRequested
# publications only (other event types are untouched). At startup, re-delivery is immediate
# (minAge zero); the periodic run uses the configured minAge. The revocation operation is idempotent.
nexus.session.revocation.resubmit-interval=${NEXUS_SESSION_REVOCATION_RESUBMIT_INTERVAL:60s}
nexus.session.revocation.resubmit-batch-size=${NEXUS_SESSION_REVOCATION_RESUBMIT_BATCH_SIZE:100}
nexus.session.revocation.resubmit-max-in-flight=${NEXUS_SESSION_REVOCATION_RESUBMIT_MAX_IN_FLIGHT:10}
nexus.session.revocation.resubmit-min-age=${NEXUS_SESSION_REVOCATION_RESUBMIT_MIN_AGE:15s}

# OAuth bootstrap client (persisted via JDBC; not consumed by the Next.js panel)
nexus.oauth.bootstrap.registered-client-id=nexus-oidc-client
nexus.oauth.bootstrap.client-id=oidc-client
nexus.oauth.bootstrap.client-secret=${NEXUS_OAUTH_BOOTSTRAP_CLIENT_SECRET:changeme-local-dev}
nexus.oauth.bootstrap.redirect-uri=${NEXUS_OAUTH_BOOTSTRAP_REDIRECT_URI:http://127.0.0.1:8080/oauth2/bootstrap/callback}
nexus.oauth.bootstrap.post-logout-redirect-uri=${nexus.frontend-base-url}/

# OAuth JWT signing keys. A committed dev keystore ships with the app so local
# dev and tests use persistent, prod-like signing keys (and readiness stays UP).
# Production MUST override all four to its own keystore: reusing the committed
# dev key in production is insecure. keystore-location accepts Spring resource
# prefixes (file:, classpath:) and bare absolute paths (/etc/...).
# Only when keystore-location is explicitly blank does the app fall back to
# ephemeral in-memory keys (dev only, logs a warning, readiness DOWN).
nexus.oauth.jwk.keystore-location=${NEXUS_OAUTH_JWK_KEYSTORE_LOCATION:classpath:keystore/dev-jwk.p12}
nexus.oauth.jwk.keystore-password=${NEXUS_OAUTH_JWK_KEYSTORE_PASSWORD:devpassword}
nexus.oauth.jwk.key-alias=${NEXUS_OAUTH_JWK_KEY_ALIAS:nexus-dev-key}
nexus.oauth.jwk.key-password=${NEXUS_OAUTH_JWK_KEY_PASSWORD:devpassword}

# Vault master key (AES-256-GCM, derived via SHA-256). A committed dev default
# ships so local dev/tests work; production MUST override NEXUS_VAULT_MASTER_KEY
# (VaultCrypto fails closed on the dev default under the 'prod' profile).
nexus.vault.master-key=${NEXUS_VAULT_MASTER_KEY:nexus-dev-vault-master-key-do-not-use-in-prod}

# Rate limiting (network-level, per-IP). Complements the per-user login lockout
# (nexus.identity.login.*) and is evaluated before the Spring Security filter
# chains. Two token-bucket tiers: 'auth' (login/MFA/token endpoints - brute-force
# defense) and 'general' (register/verify/reset - abuse/enumeration defense).
# Disable with NEXUS_RATELIMIT_ENABLED=false (e.g. if a front proxy already limits).
nexus.ratelimit.enabled=${NEXUS_RATELIMIT_ENABLED:true}
# Honor X-Forwarded-For for the per-IP key. Leave false unless behind a trusted
# proxy (Spring Boot's server.forward-headers-strategy already rewrites
# getRemoteAddr() when enabled - prefer that and keep this false).
nexus.ratelimit.trust-forwarded-for=${NEXUS_RATELIMIT_TRUST_FORWARDED_FOR:false}
nexus.ratelimit.evict-interval=${NEXUS_RATELIMIT_EVICT_INTERVAL:5m}
nexus.ratelimit.auth-capacity=${NEXUS_RATELIMIT_AUTH_CAPACITY:10}
nexus.ratelimit.auth-refill-tokens=${NEXUS_RATELIMIT_AUTH_REFILL_TOKENS:10}
nexus.ratelimit.auth-refill-period=${NEXUS_RATELIMIT_AUTH_REFILL_PERIOD:1m}
nexus.ratelimit.general-capacity=${NEXUS_RATELIMIT_GENERAL_CAPACITY:20}
nexus.ratelimit.general-refill-tokens=${NEXUS_RATELIMIT_GENERAL_REFILL_TOKENS:20}
nexus.ratelimit.general-refill-period=${NEXUS_RATELIMIT_GENERAL_REFILL_PERIOD:1h}

# Async email dispatch (offline-notify + transactional emails). Sends run on the
# notifyExecutor so a slow SMTP never blocks the heartbeat sweep or the request
# thread. CallerRunsPolicy provides back-pressure (a saturated executor runs the
# send on the caller instead of dropping it); tune the pool to your SMTP throughput.
nexus.notify.async.core-pool-size=${NEXUS_NOTIFY_ASYNC_CORE_POOL_SIZE:2}
nexus.notify.async.max-pool-size=${NEXUS_NOTIFY_ASYNC_MAX_POOL_SIZE:8}
nexus.notify.async.queue-capacity=${NEXUS_NOTIFY_ASYNC_QUEUE_CAPACITY:100}

# Audit retention: a scheduled job purges audit_log rows older than retention-days
# so the table stays bounded. Set retention-days<=0 or enabled=false to keep
# everything (unbounded growth). Export is on-demand via the panel
# (GET /api/panel/v1/projects/{id}/audit/export, NDJSON stream).
nexus.audit.retention.enabled=${NEXUS_AUDIT_RETENTION_ENABLED:true}
nexus.audit.retention.retention-days=${NEXUS_AUDIT_RETENTION_DAYS:90}
nexus.audit.retention.cron=${NEXUS_AUDIT_RETENTION_CRON:0 30 3 * * *}
