spring.application.name=Nexus

# Docker Compose
# The repository-root file is the single source of truth for local PostgreSQL,
# Redis and the Next.js frontend. The Gradle bootRun task also uses the
# repository root as its working directory.
spring.docker.compose.file=${NEXUS_COMPOSE_FILE:compose.yaml}
# Always run the idempotent `docker compose up` command. With the default
# `if-running` mode, having only PostgreSQL or Redis active prevents Spring Boot
# from starting a missing frontend container.
spring.docker.compose.start.skip=never

# Database
spring.datasource.url=${NEXUS_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nexus}
spring.datasource.username=${NEXUS_DATASOURCE_USERNAME:nexus}
spring.datasource.password=${NEXUS_DATASOURCE_PASSWORD:nexus}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Redis (shared, single instance). Used by Spring Session and future modules.
spring.data.redis.url=${NEXUS_REDIS_URL:redis://localhost:6379}
spring.data.redis.connect-timeout=2s
spring.data.redis.timeout=2s

# Security logging (verbose, useful for local debugging)
logging.level.org.springframework.security=DEBUG

# Actuator / health probes
management.endpoint.health.probes.add-additional-paths=true
management.endpoint.health.show-details=when-authorized
management.endpoints.web.exposure.include=health
management.endpoint.health.group.readiness.include=db,redis

# Frontend base URL for panel redirects and OAuth bootstrap post-logout URI
nexus.frontend-base-url=${NEXUS_FRONTEND_BASE_URL:http://localhost:3000}

# Panel session (Redis-backed via Spring Session). The timeout controls the real
# Redis session inactivity interval; the cookie properties are applied to Spring
# Session's CookieSerializer. See PanelSessionConfiguration.
nexus.session.timeout=${NEXUS_SESSION_TIMEOUT:7d}
nexus.session.cookie.name=${NEXUS_SESSION_COOKIE_NAME:JSESSIONID}
nexus.session.cookie.path=${NEXUS_SESSION_COOKIE_PATH:/}
nexus.session.cookie.http-only=${NEXUS_SESSION_COOKIE_HTTP_ONLY:true}
nexus.session.cookie.same-site=${NEXUS_SESSION_COOKIE_SAME_SITE:Lax}
nexus.session.cookie.secure=${NEXUS_SESSION_COOKIE_SECURE:false}
nexus.session.cookie.max-age=${NEXUS_SESSION_COOKIE_MAX_AGE:7d}

# Session revocation reliability. Spring Modulith persists event publications and
# PanelSessionRevocationRepublisher re-delivers incomplete NexusAccountSessionsRevocationRequested
# publications only (other event types are untouched). At startup, re-delivery is immediate
# (minAge zero); the periodic run uses the configured minAge. The revocation operation is idempotent.
nexus.session.revocation.resubmit-interval=${NEXUS_SESSION_REVOCATION_RESUBMIT_INTERVAL:60s}
nexus.session.revocation.resubmit-batch-size=${NEXUS_SESSION_REVOCATION_RESUBMIT_BATCH_SIZE:100}
nexus.session.revocation.resubmit-max-in-flight=${NEXUS_SESSION_REVOCATION_RESUBMIT_MAX_IN_FLIGHT:10}
nexus.session.revocation.resubmit-min-age=${NEXUS_SESSION_REVOCATION_RESUBMIT_MIN_AGE:15s}

# OAuth bootstrap client (persisted via JDBC; not consumed by the Next.js panel)
nexus.oauth.bootstrap.registered-client-id=nexus-oidc-client
nexus.oauth.bootstrap.client-id=oidc-client
nexus.oauth.bootstrap.client-secret=${NEXUS_OAUTH_BOOTSTRAP_CLIENT_SECRET:changeme-local-dev}
nexus.oauth.bootstrap.redirect-uri=${NEXUS_OAUTH_BOOTSTRAP_REDIRECT_URI:http://127.0.0.1:8080/oauth2/bootstrap/callback}
nexus.oauth.bootstrap.post-logout-redirect-uri=${nexus.frontend-base-url}/
