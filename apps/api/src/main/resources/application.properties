spring.application.name=Nexus

# Database
spring.datasource.url=${NEXUS_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nexus}
spring.datasource.username=${NEXUS_DATASOURCE_USERNAME:nexus}
spring.datasource.password=${NEXUS_DATASOURCE_PASSWORD:nexus}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Security logging (verbose, useful for local debugging)
logging.level.org.springframework.security=DEBUG

# Frontend base URL for panel redirects and OAuth bootstrap post-logout URI
nexus.frontend-base-url=${NEXUS_FRONTEND_BASE_URL:http://localhost:3000}

# Panel session cookie
server.servlet.session.timeout=${NEXUS_SESSION_TIMEOUT:7d}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=${NEXUS_SESSION_COOKIE_SECURE:false}
server.servlet.session.cookie.max-age=${NEXUS_SESSION_COOKIE_MAX_AGE:7d}

# OAuth bootstrap client (persisted via JDBC; not consumed by the Next.js panel)
nexus.oauth.bootstrap.registered-client-id=nexus-oidc-client
nexus.oauth.bootstrap.client-id=oidc-client
nexus.oauth.bootstrap.client-secret=${NEXUS_OAUTH_BOOTSTRAP_CLIENT_SECRET:changeme-local-dev}
nexus.oauth.bootstrap.redirect-uri=${NEXUS_OAUTH_BOOTSTRAP_REDIRECT_URI:http://127.0.0.1:8080/oauth2/bootstrap/callback}
nexus.oauth.bootstrap.post-logout-redirect-uri=${nexus.frontend-base-url}/
