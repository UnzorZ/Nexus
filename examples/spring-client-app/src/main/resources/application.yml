# Nexus reference client app — consumes the nexus-spring-boot-starter.
#
# Configure against a Nexus project:
#   - an API key with scopes: registry:heartbeat, authz:snapshot,
#     permissions:declare, notify:send
#   - an OAuth client (redirect http://localhost:8081/login/oauth2/code/nexus)
#     with a backchannel_logout_uri of http://localhost:8081/logout/backchannel
#   - a role granting the demo permissions (orders.*, inventory.read)
# See README.md.

server:
  port: 8081

nexus:
  # --- Management half (API-key) ---
  url: ${NEXUS_URL:http://localhost:8080}
  api-key: ${NEXUS_API_KEY}
  app-name: ${NEXUS_APP_NAME:nexus-spring-client-app}
  instance-id: ${NEXUS_INSTANCE_ID:}
  heartbeat:
    enabled: ${NEXUS_HEARTBEAT_ENABLED:true}
    interval: ${NEXUS_HEARTBEAT_INTERVAL:30s}
  permissions:
    snapshot-ttl: 30s
    fail-closed: true
    declarations:
      - { key: orders.read, label: Ver pedidos }
      - { key: orders.cancel, label: Cancelar pedidos }
      - { key: orders.refund, label: Reembolsar pedidos }
      - { key: inventory.read, label: Ver inventario }

  # --- Security half (OAuth2/OIDC) ---
  security:
    issuer: http://localhost:8080/p/${NEXUS_PROJECT_SLUG:f-shop}
    # Resource-server mode: jwt (local validation, default) or introspect (per-request).
    rs-mode: ${NEXUS_RS_MODE:jwt}
    client:
      client-id: ${NEXUS_CLIENT_ID}
      client-secret: ${NEXUS_CLIENT_SECRET}
    backchannel-logout-path: /logout/backchannel

logging:
  level:
    org.springframework.security: INFO
    io.nexus.client: INFO
