# Nexus reference client + resource-server app.
#
# Configure against a Nexus project: create the project, an OAuth client
# (redirect http://localhost:8081/login/oauth2/code/nexus) and a role granting
# the demo permissions (orders.*, inventory.read). See README.md.
server:
  port: 8081

nexus:
  rs:
    # Resource-server authorization mode.
    #   jwt       — validate the access token locally (signature + exp); fast,
    #               but a role revocation is only honored once the token expires.
    #   introspect — call /oauth2/introspect per request; honors authz_version
    #               revocation at the cost of a server round-trip each time.
    mode: ${NEXUS_RS_MODE:jwt}

spring:
  security:
    oauth2:
      client:
        registration:
          nexus:
            provider: nexus
            client-id: ${NEXUS_CLIENT_ID}
            client-secret: ${NEXUS_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - profile
            client-name: Nexus
        provider:
          nexus:
            # OIDC discovery against the project issuer.
            issuer-uri: http://localhost:8080/p/${NEXUS_PROJECT_SLUG:f-shop}/.well-known/openid-configuration
            user-name-attribute: sub
      resourceserver:
        jwt:
          # Same discovery doc — supplies the JWKS URI and the issuer for `iss` validation.
          issuer-uri: http://localhost:8080/p/${NEXUS_PROJECT_SLUG:f-shop}/.well-known/openid-configuration

# --- Introspection mode (NEXUS_RS_MODE=introspect) -------------------------
# When mode=introspect, the resource-server chain below switches to opaque-token
# introspection. Uncomment/override these to enable it.
#
# spring:
#   security:
#     oauth2:
#       resourceserver:
#         opaquetoken:
#           introspection-uri: http://localhost:8080/p/${NEXUS_PROJECT_SLUG:f-shop}/oauth2/introspect
#           client-id: ${NEXUS_CLIENT_ID}
#           client-secret: ${NEXUS_CLIENT_SECRET}

logging:
  level:
    org.springframework.security: INFO
