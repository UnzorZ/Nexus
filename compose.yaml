name: nexus

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
    ports:
      - "5432:5432"
    volumes:
      - nexus-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8.8.0-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 96mb
      - --maxmemory-policy
      - noeviction
      - --notify-keyspace-events
      - Egx
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - nexus-redis-data:/data
    mem_limit: 160m
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "node -e \"const pkg = require('./package.json'); for (const name of Object.keys({ ...(pkg.dependencies || {}), ...(pkg.devDependencies || {}) })) require(name + '/package.json')\" >/dev/null 2>&1 || npm install --include=optional; rm -rf .next; npm run dev -- --hostname 0.0.0.0"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_NEXUS_API_BASE_URL: "${NEXT_PUBLIC_NEXUS_API_BASE_URL:-http://localhost:8080}"
      NEXUS_API_BASE_URL: "http://host.docker.internal:8080"
      NEXUS_AUTH_BASE_URL: "${NEXT_PUBLIC_NEXUS_API_BASE_URL:-http://localhost:8080}"
      NEXUS_AUTH_INTERNAL_BASE_URL: "http://host.docker.internal:8080"
      NEXUS_FRONTEND_BASE_URL: "${NEXUS_FRONTEND_BASE_URL:-http://localhost:3000}"
      NEXUS_ALLOWED_DEV_ORIGINS: "${NEXUS_ALLOWED_DEV_ORIGINS:-127.0.0.1}"
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - nexus-web-node-modules:/app/node_modules
      - nexus-web-npm-cache:/root/.npm

volumes:
  nexus-postgres-data:
  nexus-redis-data:
  nexus-web-node-modules:
  nexus-web-npm-cache:
