stages:
  - test
  - deploy

default:
  tags:
    - wprioja
  interruptible: true

variables:
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"
  # The job container uses the runner host's Docker socket. Testcontainers
  # must connect to published ports through that host, not through localhost.
  TESTCONTAINERS_HOST_OVERRIDE: "127.0.0.1"
  # Ryuk itself also needs the daemon socket path as seen inside its container.
  TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: "/var/run/docker.sock"

cache:
  key: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"
  paths:
    - .gradle/caches/
    - .gradle/wrapper/
    - .npm/

api_tests:
  stage: test
  image: eclipse-temurin:21-jdk-alpine
  script:
    - ./gradlew :apps:nexus-api:test --no-daemon --console=plain
  artifacts:
    when: on_failure
    expire_in: 7 days
    paths:
      - apps/api/build/reports/tests/

sdk_and_example_tests:
  stage: test
  image: eclipse-temurin:21-jdk-alpine
  script:
    - ./gradlew :packages:nexus-spring-boot-sdk:test :examples:nexus-spring-client-app:test --no-daemon --console=plain
  artifacts:
    when: on_failure
    expire_in: 7 days
    paths:
      - packages/nexus-spring-boot-sdk/build/reports/tests/
      - examples/spring-client-app/build/reports/tests/

web_tests:
  stage: test
  image: node:22-alpine
  before_script:
    - cd apps/web
    - npm ci
  script:
    - npm test
    - npm run lint || true
    - npm run build

deploy_production:
  stage: deploy
  image: alpine:3.22
  interruptible: false
  resource_group: nexus-production
  environment:
    name: production
    url: https://nexus.unzor.dev
  needs:
    - api_tests
    - sdk_and_example_tests
    - web_tests
  before_script:
    - apk add --no-cache openssh-client
    - install -d -m 700 ~/.ssh
    - echo "$NEXUS_SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/id_ed25519
    - echo "$NEXUS_SSH_KNOWN_HOSTS_B64" | base64 -d > ~/.ssh/known_hosts
    - chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts
  script:
    - |
      set -eu
      archive_name="nexus-$CI_PIPELINE_ID.tar.gz"
      archive="/tmp/$archive_name"
      incoming="$NEXUS_DEPLOY_DIR/.incoming-$archive_name"
      ssh_target="$NEXUS_SSH_USER@$NEXUS_SSH_HOST"
      ssh_opts="-p $NEXUS_SSH_PORT -o BatchMode=yes -o IdentitiesOnly=yes"

      tar -czf "$archive" \
        --exclude=.git \
        --exclude=.gradle \
        --exclude=.npm \
        --exclude='**/build' \
        --exclude='**/node_modules' \
        --exclude='**/.next' \
        --exclude='.env*' \
        .

      scp -P "$NEXUS_SSH_PORT" -o BatchMode=yes -o IdentitiesOnly=yes \
        "$archive" "$ssh_target:$incoming"

      ssh $ssh_opts "$ssh_target" \
        "NEXUS_DEPLOY_DIR='$NEXUS_DEPLOY_DIR' INCOMING='$incoming' PIPELINE_ID='$CI_PIPELINE_ID' bash -s" <<'REMOTE'
      set -euo pipefail
      app="$NEXUS_DEPLOY_DIR/app"
      release="$NEXUS_DEPLOY_DIR/.release-$PIPELINE_ID"
      backup="$NEXUS_DEPLOY_DIR/.previous-$PIPELINE_ID"
      compose="docker compose --env-file $NEXUS_DEPLOY_DIR/.env -f $app/compose.prod.yaml"

      mkdir -p "$release"
      tar -xzf "$INCOMING" -C "$release"
      if [ -d "$app" ]; then
        mv "$app" "$backup"
      fi
      mv "$release" "$app"

      rollback() {
        echo "Nexus no superó el despliegue; restaurando la versión anterior."
        if [ -d "$backup" ]; then
          mv "$app" "$NEXUS_DEPLOY_DIR/.failed-$PIPELINE_ID"
          mv "$backup" "$app"
          docker compose --env-file "$NEXUS_DEPLOY_DIR/.env" -f "$app/compose.prod.yaml" build api
          docker compose --env-file "$NEXUS_DEPLOY_DIR/.env" -f "$app/compose.prod.yaml" build web
          docker compose --env-file "$NEXUS_DEPLOY_DIR/.env" -f "$app/compose.prod.yaml" up -d
        fi
      }
      trap rollback ERR

      # Build sequentially: the production VM has 3 GiB and parallel Gradle +
      # Next.js builds can exhaust memory even with swap available.
      $compose build api
      $compose build web
      $compose up -d

      api_healthy=false
      web_healthy=false
      for attempt in $(seq 1 36); do
        if curl -fsS --max-time 5 http://127.0.0.1:8080/actuator/health/readiness | grep -q '"status":"UP"'; then
          api_healthy=true
        fi
        if curl -fsS --max-time 5 http://127.0.0.1:3000/ >/dev/null; then
          web_healthy=true
        fi
        if [ "$api_healthy" = true ] && [ "$web_healthy" = true ]; then
          break
        fi
        sleep 5
      done
      [ "$api_healthy" = true ]
      [ "$web_healthy" = true ]
      trap - ERR
      echo "Nexus API y web desplegados y saludables."
      REMOTE
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
